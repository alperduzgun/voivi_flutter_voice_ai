name: voivi_voice_ai
description: "Complete Conversation AI Kit for Flutter. Build intelligent voice and text conversations with GPT-4, Azure Speech, and custom AI backends. Multi-modal AI SDK for production apps."
version: 1.3.2
homepage: https://github.com/voivihq/voivi_voice_ai
repository: https://github.com/voivihq/voivi_voice_ai
documentation: https://github.com/voivihq/voivi_voice_ai#readme
issue_tracker: https://github.com/voivihq/voivi_voice_ai/issues

topics:
  - conversation-ai
  - conversational-ai
  - voice-ai
  - ai-assistant
  - multimodal-ai
  - chatbot
  - speech-to-text
  - text-to-speech
  - gpt-4
  - websocket
  - real-time
  - flutter-sdk
  - voice-assistant
  - ai-chat

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  # Core WebSocket communication
  web_socket_channel: ^3.0.1

  # HTTP client for REST API
  http: ^1.2.0
  dio: ^5.9.0

  # Utilities for validation and error handling
  meta: ^1.9.1

dev_dependencies:
  test: ^1.24.3
  lints: ^3.0.0
  mockito: ^5.4.2
  build_runner: ^2.4.7